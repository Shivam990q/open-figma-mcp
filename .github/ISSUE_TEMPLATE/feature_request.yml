name: 💡 Feature request
description: Suggest a new tool, codegen target, token format, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should OpenFigma do? A new tool? A new --framework? A flag?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Code generation (new framework / better output)
        - Design tokens (new format)
        - Figma API coverage (new endpoint/tool)
        - Accessibility / diff / drift
        - Performance / caching
        - Docs / examples
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any existing tools or workarounds you've tried.
